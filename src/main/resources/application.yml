server:
    port: 8081

spring:
    application:
        name: SolTracker

    jpa:
        open-in-view: false
        properties:
            hibernate:
                default_schema: sol
        hibernate:
            ddl-auto: validate
        show-sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect

    flyway:
        schemas: sol

    cache:
        type: caffeine
        caffeine:
            spec: maximumSize=500,expireAfterWrite=10m

app:
    datasource:
        postgres:
            url: jdbc:postgresql://localhost:5432/app
            username: postgres
            password: postgres
            driver-class-name: org.postgresql.Driver

        clickhouse:
            url: jdbc:clickhouse://localhost:8123/default
            username: default
            password:
            driver-class-name: com.clickhouse.jdbc.ClickHouseDriver