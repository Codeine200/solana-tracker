server:
    port: 8081

spring:
    application:
        name: SolTracker

    datasource:
        url: jdbc:postgresql://localhost:5432/sol
        username: soluser
        password: test
        driver-class-name: org.postgresql.Driver

    jpa:
        open-in-view: false
        properties:
            hibernate:
                default_schema: sol
        hibernate:
            ddl-auto: validate
        show-sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect

    flyway:
        schemas: sol

    cache:
        type: caffeine
        caffeine:
            spec: maximumSize=500,expireAfterWrite=10m